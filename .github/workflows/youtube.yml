name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Install System Tools (Node.js & FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install latest yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Download Video
        env:
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p videos
          echo "$COOKIES" > cookies.txt
          
          # 1. Uses your cookies
          # 2. Forces YouTube to use the "Web" version (Fixes the TV/Image bug)
          # 3. Downloads the best video and audio, and merges them to an MP4
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:client=web" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "videos/%(title)s.%(ext)s" \
            "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
