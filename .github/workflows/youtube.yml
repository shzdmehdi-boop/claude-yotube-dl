name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Quality (360, 480, 720, 1080, 1440, 2160, audio-only)'
        required: false
        default: '720'
        type: choice
        options:
          - '360'
          - '480'
          - '720'
          - '1080'
          - '1440'
          - '2160'
          - 'audio-only'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download video
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          mkdir -p videos

          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          if [ "${{ inputs.quality }}" = "audio-only" ]; then
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -x --audio-format mp3 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          else
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]" \
              --merge-output-format mp4 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          fi

      - name: Check file size and warn if too large
        run: |
          for file in videos/*; do
            if [ -f "$file" ] && [ "$file" != "videos/README.md" ]; then
              size=$(stat -c%s "$file")
              sizemb=$(($size / 1024 / 1024))
              echo "File size: ${sizemb}MB"
              if [ $size -gt 524288000 ]; then
                echo "❌ ERROR: File is ${sizemb}MB — too large for GitHub (max ~500MB)."
                echo "👉 Please re-run with a lower quality like 720 or 480."
                rm "$file"
                exit 1
              fi
            fi
          done

      - name: Generate download links README
        run: |
          python3 << 'EOF'
          import os
          import urllib.parse

          repo = os.environ.get("GITHUB_REPOSITORY")
          branch = "main"
          videos_dir = "videos"

          lines = []
          lines.append("# 📥 Video Downloads\n")
          lines.append("| File | Download |\n")
          lines.append("|------|----------|\n")

          for filename in sorted(os.listdir(videos_dir)):
              if filename == "README.md":
                  continue
              encoded = urllib.parse.quote(filename)
              url = f"https://github.com/{repo}/raw/{branch}/videos/{encoded}"
              lines.append(f"| {filename} | [⬇️ Download]({url}) |\n")

          with open(os.path.join(videos_dir, "README.md"), "w") as f:
              f.writelines(lines)

          print("README.md generated successfully")
          EOF

      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git diff --staged --quiet || git commit -m "Add downloaded video"
          git push
