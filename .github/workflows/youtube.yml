name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js (For YouTube JS Puzzles)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg (For MP4 Video creation)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp & Browser Impersonator
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          pip install curl-cffi

      - name: Download Video
        env:
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p videos
          echo "$COOKIES" > cookies.txt
          
          # FIXED TYPO: Now correctly tells yt-dlp to use the iOS and Android apps!
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:client=ios,android" \
            --impersonate "chrome" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "videos/%(title)s.%(ext)s" \
            "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
