name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, audio-only)'
        required: false
        default: 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download video
        run: |
          mkdir -p videos
          if [ "${{ inputs.quality }}" = "audio-only" ]; then
            yt-dlp -x --audio-format mp3 -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          elif [ "${{ inputs.quality }}" = "best" ]; then
            yt-dlp -f "bestvideo+bestaudio" --merge-output-format mp4 -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          else
            yt-dlp -f "bestvideo[height<=${{ inputs.quality }}]+bestaudio" --merge-output-format mp4 -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: videos/
          retention-days: 7
