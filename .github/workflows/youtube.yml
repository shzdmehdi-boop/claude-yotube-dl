name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, audio-only)'
        required: false
        default: 'best'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download video
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          mkdir -p videos

          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          if [ "${{ inputs.quality }}" = "audio-only" ]; then
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -x --audio-format mp3 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          elif [ "${{ inputs.quality }}" = "best" ]; then
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -f "bestvideo+bestaudio" --merge-output-format mp4 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          else
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -f "bestvideo[height<=${{ inputs.quality }}]+bestaudio" --merge-output-format mp4 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          fi

      - name: Split large files
        run: |
          cd videos
          for file in *; do
            # Check if file is larger than 90MB
            size=$(stat -c%s "$file")
            if [ $size -gt 94371840 ]; then
              echo "Splitting $file..."
              split -b 90M "$file" "${file}.part"
              rm "$file"
            fi
          done
          cd ..

      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "Add downloaded video"
          git push
