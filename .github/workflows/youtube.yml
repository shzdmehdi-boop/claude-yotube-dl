name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg (For Video/Audio Merging)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp & Chrome Impersonator
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          pip install curl-cffi

      - name: Download Video
        run: |
          mkdir -p videos
          
          # 1. Impersonate Chrome to bypass Data Center blocks
          # 2. Force the Android App to bypass JS Security Puzzles
          yt-dlp \
            --impersonate "chrome" \
            --extractor-args "youtube:client=android" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "videos/%(title)s.%(ext)s" \
            "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
