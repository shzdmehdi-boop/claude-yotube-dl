name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, audio-only)'
        required: false
        default: 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download video
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          mkdir -p videos

          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          if [ "${{ inputs.quality }}" = "audio-only" ]; then
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -x --audio-format mp3 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          elif [ "${{ inputs.quality }}" = "best" ]; then
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -f "bestvideo+bestaudio" --merge-output-format mp4 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          else
            yt-dlp $COOKIE_ARG --js-runtimes node --remote-components ejs:github \
              -f "bestvideo[height<=${{ inputs.quality }}]+bestaudio" --merge-output-format mp4 \
              -o "videos/%(title)s.%(ext)s" "${{ inputs.url }}"
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: videos/
          retention-days: 7
