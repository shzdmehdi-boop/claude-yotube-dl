name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Install System Tools (Node.js & FFmpeg)
        run: |
          sudo apt-get update
          # We install Node.js directly so the bot can solve YouTube's puzzles!
          sudo apt-get install -y nodejs ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp & Chrome Impersonator
        run: |
          python -m pip install --upgrade pip
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          pip install curl-cffi

      - name: Download Video
        env:
          # Bringing your cookies back!
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p videos
          echo "$COOKIES" > cookies.txt
          
          # THE ULTIMATE COMBO:
          # 1. Uses your Cookies to prove you are human
          # 2. Impersonates Chrome
          # 3. Uses Android/iOS mobile versions
          yt-dlp \
            --cookies cookies.txt \
            --impersonate "chrome" \
            --extractor-args "youtube:client=android,ios,web" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "videos/%(title)s.%(ext)s" \
            "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
