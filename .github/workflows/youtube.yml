name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp (Downloader)
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Download Video
        run: |
          mkdir -p videos
          # Downloads the video into the "videos" folder
          yt-dlp -o "videos/%(title)s.%(ext)s" "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
