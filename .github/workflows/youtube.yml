name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'Paste the YouTube Video Link here'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      # This fixes the "JavaScript runtime" warning you got
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install latest yt-dlp
        run: |
          python -m pip install --upgrade pip
          # Installs the absolute newest version to fight YouTube blocks
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Download Video
        env:
          # This grabs the secret you just created
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p videos
          # This saves your secret cookies into a file the bot can read
          echo "$COOKIES" > cookies.txt
          
          # Runs the downloader using your cookies!
          yt-dlp --cookies cookies.txt -o "videos/%(title)s.%(ext)s" "${{ github.event.inputs.youtube_link }}"

      - name: Upload Video for you to download
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Video
          path: videos/
